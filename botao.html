<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Segoe UI, sans-serif;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  h1 {
    color: #cccccc;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .botoes {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    border: none;
    border-radius: 50px;
    padding: 14px 32px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: opacity 0.15s, transform 0.1s;
    min-width: 160px;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }

  .btn-verde { background: #3B6D11; color: #C0DD97; }
  .btn-azul  { background: #0C447C; color: #B5D4F4; }
  .btn-roxo  { background: #3C3489; color: #CECBF6; }
</style>
</head>
<body>
  <div class="container">
    <h1>Selecione a sua mesa</h1>
    <div class="botoes">
      <button class="btn btn-verde" onclick="abrir('renovaveis')">Renováveis</button>
      <button class="btn btn-azul"  onclick="abrir('hidricas')">Hídricas</button>
      <button class="btn btn-roxo"  onclick="abrir('transmissao')">Transmissão</button>
    </div>
  </div>

  <script>
    const sistemas = {
      renovaveis: [
        "https://sgo.edp.com.br/EventsManagement/EventsList.aspx",
        "https://sintegre.ons.org.br/",
        "https://outlook.office.com/"
      ],
      hidricas: [
        "https://sgo.edp.com.br/EventsManagement/EventsList.aspx",
        "https://sintegre.ons.org.br/",
        "https://outlook.office.com/"
      ],
      transmissao: [
        "https://sgo.edp.com.br/EventsManagement/EventsList.aspx",
        "https://sintegre.ons.org.br/",
        "https://outlook.office.com/"
      ]
    };

    function abrir(sistema) {
      sistemas[sistema].forEach(url => window.open(url, "_blank"));
    }
  </script>
</body>
</html>
